<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pasapalabras de la Biblia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#fdf6e3;color:#333;min-height:100vh}
.screen{display:none}
.screen.active{display:flex;flex-direction:column;min-height:100vh}

/* ── SETUP ── */
#setup-screen{align-items:center;justify-content:center;padding:20px;text-align:center}
.logo{font-size:2rem;font-weight:900;color:#8B4513;letter-spacing:1px}
.logo span{color:#B8860B}
.tagline{color:#B8860B;margin-bottom:28px;font-size:1rem}
.card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:420px;box-shadow:0 4px 20px rgba(0,0,0,.12)}
label{display:block;text-align:left;font-weight:600;margin-bottom:5px;color:#555;font-size:.9rem}
input[type=number],input[type=text]{width:100%;padding:11px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:1rem;margin-bottom:14px;transition:border .2s}
input:focus{outline:none;border-color:#B8860B}
#groups-container{margin-bottom:6px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:transform .1s,filter .2s;letter-spacing:.3px}
.btn:active{transform:scale(.97)}
.btn-gold{background:linear-gradient(135deg,#B8860B,#d4a017);color:#fff}
.btn-gold:hover{filter:brightness(1.08)}
.btn-green{background:#43a047;color:#fff}
.btn-orange{background:#ef6c00;color:#fff}
.btn-red{background:#e53935;color:#fff}
.btn-gray{background:#757575;color:#fff}
.btn-sm{padding:10px;font-size:.95rem;border-radius:8px}

/* ── GAME ── */
#game-screen{padding:10px 12px;gap:8px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.top-bar .brand{font-weight:800;color:#8B4513;font-size:.95rem}

.turn-card{background:#fff;border-radius:12px;padding:10px 14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.turn-group{font-size:1.3rem;font-weight:800;color:#B8860B}
.turn-sub{font-size:.8rem;color:#888;margin-top:2px}

/* Group tabs */
.group-tabs{display:flex;gap:6px;overflow-x:auto;padding:2px 0}
.gtab{padding:5px 12px;border-radius:20px;font-size:.78rem;font-weight:700;border:none;cursor:pointer;white-space:nowrap;transition:all .2s}
.gtab.active-tab{background:#B8860B;color:#fff}
.gtab.inactive-tab{background:#e0e0e0;color:#666}
.gtab.done-tab{background:#c8e6c9;color:#2e7d32}

.rosco-wrap{position:relative;width:min(320px,88vw);height:min(320px,88vw);margin:0 auto}
.rl{position:absolute;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.72rem;transform:translate(-50%,-50%);transition:background .3s,box-shadow .3s;border:2px solid transparent}
.rl.pending{background:#e0e0e0;color:#777}
.rl.current{background:#1976D2;color:#fff;border-color:#0d47a1;box-shadow:0 0 0 4px rgba(25,118,210,.35);animation:pulse 1.1s ease-in-out infinite}
.rl.correct{background:#43a047;color:#fff}
.rl.wrong{background:#e53935;color:#fff}
.rl.paso{background:#ef6c00;color:#fff}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(25,118,210,.35)}50%{box-shadow:0 0 0 7px rgba(25,118,210,.15)}}

.q-card{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.q-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.q-badge{width:44px;height:44px;border-radius:50%;background:#e3f2fd;color:#1976D2;font-size:1.4rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.q-text{font-size:1rem;color:#222;line-height:1.45;flex:1}
.reveal-btn{font-size:.8rem;color:#aaa;cursor:pointer;text-align:right;text-decoration:underline;margin-top:4px}
.reveal-ans{display:none;font-weight:800;color:#43a047;font-size:1rem;margin-top:6px;text-align:center;padding:6px;background:#f1f8e9;border-radius:8px}
.reveal-ans.on{display:block}

.action-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

.score-panel{background:#fff;border-radius:12px;padding:10px 12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.score-panel h4{color:#B8860B;font-size:.85rem;margin-bottom:6px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:#fafafa;padding:5px 7px;text-align:center;font-weight:700;color:#666;border-bottom:2px solid #f0f0f0}
td{padding:5px 7px;text-align:center;border-bottom:1px solid #f5f5f5}
td:first-child{text-align:left}
tr.cur-row td{background:#fff8e1;font-weight:700}
.done-row td{opacity:.6;text-decoration:line-through}

/* ── END ── */
#end-screen{align-items:center;justify-content:center;padding:24px;text-align:center;gap:16px}
.end-logo{font-size:2rem;font-weight:900;color:#8B4513}
.end-sub{color:#B8860B;font-size:1rem}
.end-card{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:420px;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.winner-line{font-size:1.4rem;font-weight:900;color:#B8860B;margin-bottom:14px}
.fs-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:.95rem}
.fs-row:last-child{border-bottom:none}
.fs-name{font-weight:700}
.fs-scores span{margin-left:6px;font-weight:700}
.g{color:#43a047}.o{color:#ef6c00}.r{color:#e53935}
</style>
</head>
<body>

<!-- ══════════ SETUP ══════════ -->
<div id="setup-screen" class="screen active">
  <div class="logo">✝ Pasapalabras <span>Bíblico</span></div>
  <div class="tagline">¿Cuánto sabes de la Biblia?</div>
  <div class="card">
    <label for="num-groups">Número de grupos</label>
    <input type="number" id="num-groups" min="2" max="8" value="2" oninput="updateGroupInputs()">
    <div id="groups-container"></div>
    <button class="btn btn-gold" onclick="startGame()">¡Comenzar el juego!</button>
  </div>
</div>

<!-- ══════════ GAME ══════════ -->
<div id="game-screen" class="screen">
  <div class="top-bar">
    <span class="brand">✝ Pasapalabras Bíblico</span>
    <button class="btn btn-gray btn-sm" style="width:auto;padding:6px 12px;font-size:.8rem" onclick="if(confirm('¿Reiniciar el juego?')) reset()">↩ Reiniciar</button>
  </div>

  <!-- Group tabs (tap to peek another group's rosco) -->
  <div class="group-tabs" id="group-tabs"></div>

  <div class="turn-card">
    <div class="turn-group" id="cur-group-name">—</div>
    <div class="turn-sub" id="cur-sub">—</div>
  </div>

  <div class="rosco-wrap" id="rosco"></div>

  <div class="q-card" id="q-card">
    <div class="q-top">
      <div class="q-badge" id="q-badge">A</div>
      <div class="q-text" id="q-text">—</div>
    </div>
    <div class="reveal-btn" onclick="toggleAns()">Ver respuesta ▼</div>
    <div class="reveal-ans" id="reveal-ans">—</div>
  </div>

  <div class="action-btns" id="action-btns">
    <button class="btn btn-sm btn-green" onclick="answer('correct')">✓ Correcto</button>
    <button class="btn btn-sm btn-orange" onclick="answer('paso')">⇒ Paso</button>
    <button class="btn btn-sm btn-red" onclick="answer('wrong')">✗ Incorrecto</button>
  </div>

  <div class="score-panel">
    <h4>Marcador</h4>
    <table>
      <thead><tr><th>Grupo</th><th class="g">✓</th><th class="o">⇒</th><th class="r">✗</th><th style="color:#888">Faltan</th></tr></thead>
      <tbody id="score-body"></tbody>
    </table>
  </div>
</div>

<!-- ══════════ END ══════════ -->
<div id="end-screen" class="screen">
  <div class="end-logo">✝ Pasapalabras</div>
  <div class="end-sub">¡Juego terminado!</div>
  <div class="end-card">
    <div class="winner-line" id="winner-line"></div>
    <div id="final-scores"></div>
  </div>
  <button class="btn btn-gold" style="max-width:420px;margin:0 auto" onclick="reset()">Jugar de nuevo</button>
</div>

<script>
// ══════════════════════════════════════════
//  BANCO DE PREGUNTAS (3 por letra)
// ══════════════════════════════════════════
const QDB = {
  A:[
    {p:"Último libro de la Biblia",r:"APOCALIPSIS"},
    {p:"Primer hombre creado por Dios",r:"ADÁN"},
    {p:"Patriarca padre de la fe, llamado a dejar su tierra natal",r:"ABRAHAM"}
  ],
  B:[
    {p:"Pueblo donde vivía Lázaro",r:"BETANIA"},
    {p:"Torre que los hombres construyeron para llegar al cielo",r:"BABEL"},
    {p:"Sacramento con agua que Jesús recibió en el río Jordán",r:"BAUTISMO"}
  ],
  C:[
    {p:"Pablo escribió muchas de estas a las iglesias",r:"CARTAS"},
    {p:"Lugar donde Jesús fue crucificado",r:"CALVARIO"},
    {p:"Sumo sacerdote que entregó a Jesús a Pilato",r:"CAIFÁS"}
  ],
  D:[
    {p:"Rey de Israel, autor de muchos Salmos",r:"DAVID"},
    {p:"Gran inundación en tiempos de Noé",r:"DILUVIO"},
    {p:"Joven hebreo arrojado al foso de los leones",r:"DANIEL"}
  ],
  E:[
    {p:"La primera mujer de la creación",r:"EVA"},
    {p:"Profeta que fue arrebatado al cielo en un carro de fuego",r:"ELÍAS"},
    {p:"Segundo libro de la Biblia que narra la salida de Israel de Egipto",r:"ÉXODO"}
  ],
  F:[
    {p:"Pueblo de Goliat, enemigos de Israel",r:"FILISTEOS"},
    {p:"Rey de Egipto que esclavizó al pueblo de Israel",r:"FARAÓN"},
    {p:"Según Hebreos 11:1, es la certeza de lo que se espera",r:"FE"}
  ],
  G:[
    {p:"Primer libro de la Biblia",r:"GÉNESIS"},
    {p:"Región donde Jesús creció y realizó muchos milagros",r:"GALILEA"},
    {p:"Gigante filisteo que David venció con una honda y una piedra",r:"GOLIAT"}
  ],
  H:[
    {p:"Frase que le decían a Jesús cuando entró a Jerusalén",r:"HOSANNA"},
    {p:"Rey que ordenó matar a los niños menores de 2 años buscando a Jesús",r:"HERODES"},
    {p:"Libro del Nuevo Testamento cuyo capítulo 11 habla de los héroes de la fe",r:"HEBREOS"}
  ],
  I:[
    {p:"Sobrenombre de Judas, el que traicionó a Jesús",r:"ISCARIOTE"},
    {p:"Nombre del pueblo elegido por Dios",r:"ISRAEL"},
    {p:"Profeta del Antiguo Testamento que anunció la venida del Mesías",r:"ISAÍAS"}
  ],
  J:[
    {p:"Ciudad más antigua, cuyas murallas cayeron al sonar las trompetas",r:"JERICÓ"},
    {p:"Profeta que estuvo tres días en el vientre de un gran pez",r:"JONÁS"},
    {p:"Apóstol conocido como 'el discípulo amado'",r:"JUAN"}
  ],
  K:[
    {p:"Palabra griega que significa 'proclamación' o 'predicación', usada en el NT para referirse al anuncio del Evangelio (Romanos 16:25)",r:"KERYGMA"},
    {p:"Palabra griega del NT que describe la comunión y comunidad entre los creyentes, mencionada en Hechos 2:42",r:"KOINONÍA"},
    {p:"Título griego que significa 'Señor', usado para referirse a Jesús y a Dios en el Nuevo Testamento",r:"KYRIOS"}
  ],
  L:[
    {p:"Jesús es la ______ del mundo",r:"LUZ"},
    {p:"Amigo de Jesús que resucitó cuatro días después de muerto",r:"LÁZARO"},
    {p:"Tercer libro de la Biblia, contiene las leyes y rituales del pueblo de Israel",r:"LEVÍTICO"}
  ],
  M:[
    {p:"Lo que Jesús hacía al sanar enfermos y resucitar muertos",r:"MILAGROS"},
    {p:"Líder que guió al pueblo de Israel por el desierto durante 40 años",r:"MOISÉS"},
    {p:"Pan del cielo que Dios proveyó al pueblo de Israel en el desierto",r:"MANÁ"}
  ],
  N:[
    {p:"Cuarto libro de la Biblia, relata el recorrido de Israel por el desierto",r:"NÚMEROS"},
    {p:"Ciudad donde Jesús creció y fue educado",r:"NAZARET"},
    {p:"Patriarca que construyó el arca para salvarse del diluvio",r:"NOÉ"}
  ],
  O:[
    {p:"Árbol del monte donde Jesús acostumbraba orar",r:"OLIVO"},
    {p:"Acto de comunicarse con Dios",r:"ORACIÓN"},
    {p:"Profeta cuyo matrimonio simbolizaba la relación de Dios con Israel infiel",r:"OSEAS"}
  ],
  P:[
    {p:"Apóstol que antes se llamaba Simón",r:"PEDRO"},
    {p:"Apóstol que perseguía a los cristianos antes de convertirse en el camino a Damasco",r:"PABLO"},
    {p:"Fiesta judía que recuerda la salida de Egipto",r:"PASCUA"}
  ],
  R:[
    {p:"Imperio que dominaba Palestina en tiempos de Jesús",r:"ROMANO"},
    {p:"Regreso de Jesús a la vida al tercer día de su muerte",r:"RESURRECCIÓN"},
    {p:"Mujer moabita que dijo: 'Donde tú vayas, yo iré'",r:"RUT"}
  ],
  S:[
    {p:"Rey que construyó el templo de Jerusalén",r:"SALOMÓN"},
    {p:"Personaje de la parábola de Jesús que ayudó a un herido en el camino",r:"SAMARITANO"},
    {p:"Juez de Israel cuya fuerza sobrenatural residía en su cabello",r:"SANSÓN"}
  ],
  T:[
    {p:"Discípulo que dudó de la resurrección de Jesús",r:"TOMÁS"},
    {p:"Edificio sagrado que Salomón construyó en Jerusalén",r:"TEMPLO"},
    {p:"Acto de Judas al entregar a Jesús por 30 monedas de plata",r:"TRAICIÓN"}
  ],
  U:[
    {p:"Acción de derramar aceite sobre la cabeza como acto sagrado",r:"UNCIÓN"},
    {p:"La ______ Cena: última comida de Jesús con sus discípulos",r:"ÚLTIMA"},
    {p:"Significado en español de 'Mesías' (hebreo) y 'Cristo' (griego)",r:"UNGIDO"}
  ],
  V:[
    {p:"Jesús dijo: 'Yo soy el camino, y la ______'",r:"VERDAD"},
    {p:"Jesús dijo: 'Yo soy la ______ verdadera'",r:"VID"},
    {p:"Jesús dijo: 'Yo soy el camino, la verdad y la ______'",r:"VIDA"}
  ],
  Z:[
    {p:"Tribu de Israel, uno de los doce hijos de Jacob",r:"ZABULÓN"},
    {p:"Profeta del Antiguo Testamento y padre de Juan el Bautista",r:"ZACARÍAS"},
    {p:"Publicano de baja estatura que subió a un árbol para ver a Jesús",r:"ZAQUEO"}
  ]
};

const LETTERS = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P','R','S','T','U','V','Z'];

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let G = {};
let peekingGroupIdx = -1; // -1 = not peeking (showing active group)

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function assignQuestions(numGroups) {
  // Each group gets different questions for each letter when possible
  const result = Array.from({length: numGroups}, () => ({}));
  for (const l of LETTERS) {
    const opts = shuffle([...QDB[l]]);
    for (let g = 0; g < numGroups; g++) {
      result[g][l] = opts[g % opts.length];
    }
  }
  return result;
}

function initState(groupNames) {
  const allQuestions = assignQuestions(groupNames.length);
  G = {
    currentGroupIdx: 0,
    groups: groupNames.map((name, i) => ({
      name,
      questions: allQuestions[i],
      states: Object.fromEntries(LETTERS.map(l => [l, 'pending'])),
      letterIdx: 0,   // index into LETTERS of current active letter
      correct: 0,
      paso: 0,
      wrong: 0,
      done: false,
    })),
  };
}

// Find next pending or paso letter index for a group, starting after current
function findNextLetterIdx(grp) {
  const n = LETTERS.length;
  for (let i = 1; i <= n; i++) {
    const idx = (grp.letterIdx + i) % n;
    const s = grp.states[LETTERS[idx]];
    if (s === 'pending' || s === 'paso') return idx;
  }
  return -1; // all resolved
}

function pendingCount(grp) {
  return LETTERS.filter(l => grp.states[l] === 'pending' || grp.states[l] === 'paso').length;
}

// ══════════════════════════════════════════
//  SETUP
// ══════════════════════════════════════════
function updateGroupInputs() {
  const n = Math.min(Math.max(parseInt(document.getElementById('num-groups').value) || 2, 2), 8);
  const c = document.getElementById('groups-container');
  c.innerHTML = '';
  for (let i = 1; i <= n; i++) {
    const lbl = document.createElement('label');
    lbl.textContent = `Nombre del grupo ${i}`;
    const inp = document.createElement('input');
    inp.type = 'text'; inp.id = `g${i}`; inp.value = `Grupo ${i}`;
    c.appendChild(lbl); c.appendChild(inp);
  }
}

function startGame() {
  const n = Math.min(Math.max(parseInt(document.getElementById('num-groups').value) || 2, 2), 8);
  const names = [];
  for (let i = 1; i <= n; i++) {
    names.push(document.getElementById(`g${i}`)?.value.trim() || `Grupo ${i}`);
  }
  initState(names);
  peekingGroupIdx = -1;
  showScreen('game-screen');
  buildRosco();
  render();
}

// ══════════════════════════════════════════
//  ROSCO
// ══════════════════════════════════════════
function buildRosco() {
  const wrap = document.getElementById('rosco');
  wrap.innerHTML = '';
  const N = LETTERS.length;
  LETTERS.forEach((l, i) => {
    const angle = (i * 360 / N - 90) * Math.PI / 180;
    const x = 50 + 44 * Math.cos(angle);
    const y = 50 + 44 * Math.sin(angle);
    const el = document.createElement('div');
    el.className = 'rl pending';
    el.id = `rl-${l}`;
    el.textContent = l;
    el.style.left = x + '%';
    el.style.top = y + '%';
    wrap.appendChild(el);
  });
}

function updateRosco(grp, activeLetter) {
  LETTERS.forEach((l, i) => {
    const el = document.getElementById(`rl-${l}`);
    if (!el) return;
    const isCurrent = (LETTERS[activeLetter] === l);
    el.className = 'rl ' + (isCurrent ? 'current' : grp.states[l]);
  });
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function render() {
  peekingGroupIdx = -1;
  const grp = G.groups[G.currentGroupIdx];
  const l = LETTERS[grp.letterIdx];
  const q = grp.questions[l];
  const pending = pendingCount(grp);

  document.getElementById('cur-group-name').textContent = grp.name;
  document.getElementById('cur-sub').textContent =
    `Letra ${l}  •  ${pending} letra${pending !== 1 ? 's' : ''} pendiente${pending !== 1 ? 's' : ''}`;

  document.getElementById('q-badge').textContent = l;
  document.getElementById('q-text').textContent = q.p;
  document.getElementById('reveal-ans').textContent = q.r;
  document.getElementById('reveal-ans').classList.remove('on');

  // Show question card and action buttons (hidden when peeking)
  document.getElementById('q-card').style.display = '';
  document.getElementById('action-btns').style.display = '';

  updateRosco(grp, grp.letterIdx);
  updateGroupTabs();
  updateScoreTable();
}

function renderPeek(gIdx) {
  // Show another group's rosco without action buttons
  peekingGroupIdx = gIdx;
  const grp = G.groups[gIdx];
  const pending = pendingCount(grp);

  document.getElementById('cur-group-name').textContent = `👁 ${grp.name} (viendo)`;
  document.getElementById('cur-sub').textContent =
    `${pending} letra${pending !== 1 ? 's' : ''} pendiente${pending !== 1 ? 's' : ''}  •  Toca tu grupo para continuar`;

  document.getElementById('q-card').style.display = 'none';
  document.getElementById('action-btns').style.display = 'none';

  updateRosco(grp, grp.letterIdx);
  updateGroupTabs();
}

// ══════════════════════════════════════════
//  GROUP TABS
// ══════════════════════════════════════════
function updateGroupTabs() {
  const container = document.getElementById('group-tabs');
  container.innerHTML = '';
  G.groups.forEach((grp, i) => {
    const btn = document.createElement('button');
    const isActive = (i === G.currentGroupIdx);
    const isPeeking = (i === peekingGroupIdx);
    btn.className = 'gtab ' + (grp.done ? 'done-tab' : isActive ? 'active-tab' : 'inactive-tab');
    btn.textContent = (isActive ? '▶ ' : '') + grp.name + (grp.done ? ' ✓' : '');
    if (isPeeking) btn.style.outline = '2px solid #B8860B';
    btn.onclick = () => {
      if (i === G.currentGroupIdx) {
        render(); // back to active group
      } else {
        renderPeek(i);
      }
    };
    container.appendChild(btn);
  });
}

// ══════════════════════════════════════════
//  ANSWER LOGIC
// ══════════════════════════════════════════
function answer(type) {
  if (peekingGroupIdx !== -1) return; // ignore if peeking

  const grp = G.groups[G.currentGroupIdx];
  const l = LETTERS[grp.letterIdx];

  if (type === 'correct') { grp.states[l] = 'correct'; grp.correct++; }
  else if (type === 'paso') { grp.states[l] = 'paso';  grp.paso++; }
  else                      { grp.states[l] = 'wrong'; grp.wrong++; }

  const next = findNextLetterIdx(grp);

  if (type === 'correct') {
    if (next === -1) {
      grp.done = true;
      switchGroup();
    } else {
      grp.letterIdx = next;
      render(); // same group continues
    }
  } else {
    // paso or wrong → switch group
    if (next === -1) grp.done = true;
    else grp.letterIdx = next;
    switchGroup();
  }
}

function switchGroup() {
  const n = G.groups.length;
  for (let i = 1; i <= n; i++) {
    const idx = (G.currentGroupIdx + i) % n;
    if (!G.groups[idx].done) {
      G.currentGroupIdx = idx;
      render();
      return;
    }
  }
  endGame();
}

function toggleAns() {
  document.getElementById('reveal-ans').classList.toggle('on');
}

// ══════════════════════════════════════════
//  SCOREBOARD
// ══════════════════════════════════════════
function updateScoreTable() {
  const tbody = document.getElementById('score-body');
  tbody.innerHTML = '';
  G.groups.forEach((grp, i) => {
    const tr = document.createElement('tr');
    if (grp.done) tr.className = 'done-row';
    else if (i === G.currentGroupIdx) tr.className = 'cur-row';
    const pending = pendingCount(grp);
    tr.innerHTML = `<td>${grp.name}</td><td class="g">${grp.correct}</td><td class="o">${grp.paso}</td><td class="r">${grp.wrong}</td><td style="color:#888">${grp.done ? '✓' : pending}</td>`;
    tbody.appendChild(tr);
  });
}

// ══════════════════════════════════════════
//  END GAME
// ══════════════════════════════════════════
function endGame() {
  const sorted = [...G.groups].sort((a,b) => b.correct - a.correct || a.wrong - b.wrong);
  const top = sorted[0];

  document.getElementById('winner-line').textContent =
    `🏆 ¡Ganador: ${top.name}! — ${top.correct} correctas`;

  document.getElementById('final-scores').innerHTML = sorted.map((grp, i) =>
    `<div class="fs-row">
      <span class="fs-name">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1)+'.'} ${grp.name}</span>
      <span class="fs-scores">
        <span class="g">${grp.correct}✓</span>
        <span class="o">${grp.paso}⇒</span>
        <span class="r">${grp.wrong}✗</span>
      </span>
    </div>`
  ).join('');

  showScreen('end-screen');
}

function reset() { showScreen('setup-screen'); }

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

updateGroupInputs();
</script>
